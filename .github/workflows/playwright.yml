name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run Playwright tests
      run: npx playwright test
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
    - name: Notify n8n
      if: always()
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |        # 1. Fetch the logs for this specific run and get the last 100 lines
        sudo journalctl -u runner-worker.service -n 500 > log_tail.txt
        cat log_tail.txt
        # 2. Use jq to safely construct your complete JSON payload
        # This automatically escapes quotes and newlines in your log file
        JSON_PAYLOAD=$(jq -n \
          --arg repo "${{ github.repository }}" \
          --arg status "${{ job.status }}" \
          --arg run_id "${{ github.run_id }}" \
          --arg branch "${{ github.ref_name }}" \
          --rawfile log_data log_tail.txt \
          '{
            repository: $repo,
            status: $status,
            run_id: $run_id,
            branch: $branch,
            playWrightLogs: $log_data
          }')

        # 3. Send the JSON payload to your webhook
        curl -X POST -H "Content-Type: application/json" \
          -d "$JSON_PAYLOAD" \
          https://shrutievirontestflow01.app.n8n.cloud/webhook-test/playwright-test
